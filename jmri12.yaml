esphome:
  name: jmri-switch-12
  friendly_name: JMRI Switch 12

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ptbMne1bOZzpTBKOh/fXWQqx3WbR1IWcpnJ2VEtmbM0="

ota:
  - platform: esphome
    password: "f74dafd145652ecba1927d5f930e676f"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Jmri-Switch-12 Fallback Hotspot"
    password: "jmriswitch12"

captive_portal:

web_server:
  port: 80
  include_internal: true

mqtt:
  broker: !secret mqtt_broker
  topic_prefix: "track"

  on_message:
    - topic: track/turnout/12
      then:
        # Check payload and act accordingly
        - if:
            condition:
              lambda: 'return x == "CLOSED";'
            then:
              - switch.turn_on: espjmri12
        - if:
            condition:
              lambda: 'return x == "THROWN";'
            then:
              - switch.turn_off: espjmri12


# Relay output configuration
switch:
  - platform: gpio
    pin:
      number: GPIO0   # Change to GPIO2 if your relay is wired there
      inverted: true  # Active LOW relay
    name: "JMRI Switch 12"
    id: espjmri12
    on_turn_on:
      - mqtt.publish:
          topic: track/turnout/12
          payload: "CLOSED"
    on_turn_off:
      - mqtt.publish:
          topic: track/turnout/12
          payload: "THROWN"
