esphome:
  name: blockdetectorgroup1
  friendly_name: BlockDetectorGroup1

esp32:
  board: esp32dev
  framework:
    type: arduino

globals:
  - id: inp_gr_addr1
    type: int
    restore_value: yes
    initial_value: '24'
  - id: inp_gr_addr2
    type: int
    restore_value: yes
    initial_value: '32'
  - id: opc_inp_rep
    type: int
    restore_value: yes
    initial_value: '0xB2'
  - id: my_dcc_addr1
    type: int
    restore_value: yes
    initial_value: '1016'
  - id: my_dcc_base
    type: int
    restore_value: yes
    initial_value: '1'
  - id: inp_rep_nr
    type: int
    restore_value: no
    initial_value: '0'
  - id: inp_rep_state
    type: int
    restore_value: no
    initial_value: '0'

number:
  - platform: template
    name: "Input Group 1"
    id: inp_gr_addr1_inp
    min_value: 0
    max_value: 4088
    step: 8
    initial_value: 24
    restore_value: true
    optimistic: true
    set_action:
      then:
        - lambda: |-
            id(inp_gr_addr1) = (int)x;  
   
  - platform: template
    name: "Input Group 2"
    id: inp_gr_addr2_inp
    min_value: 0
    max_value: 4088
    step: 8
    initial_value: 32
    restore_value: true
    optimistic: true
    set_action:
      then:
        - lambda: |-
            id(inp_gr_addr2) = (int)x;  
  - platform: template
    name: "Int Switch Address"
    id: dcc_addr_input1
    min_value: 0
    max_value: 2048
    step: 1
    initial_value: 1016
    restore_value: true
    optimistic: true
    set_action:
      then:
        - lambda: |-
            id(my_dcc_addr1) = (int)x;  

  - platform: template
    name: "Address Base"
    id: dcc_base_input
    min_value: 0
    max_value: 1
    step: 1
    initial_value: 1
    restore_value: true
    optimistic: true
    set_action:
      then:
        - lambda: |-
            id(my_dcc_base) = (int)x;  

