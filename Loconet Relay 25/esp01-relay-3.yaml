json:

mqtt:
  broker: !secret mqtt_broker
#  port: !secret mqtt_port
  topic_prefix: "esp01/relay_3"

  on_json_message:
    - topic: lnIn
      then:
        - lambda: |-
            int dcc_switch_address = id(my_dcc_addr1);
            int dcc_addr_base = id(my_dcc_base);
            if ((x.containsKey("Valid")) && (x.containsKey("MsgType")))
            {
              int temp = x["Valid"];
              String msgtype = x["MsgType"];
              if (temp == 1 && msgtype == "LN")
              {
                if (x.containsKey("Data") && x["Data"].is<JsonArrayConst>())
                {
                  JsonArrayConst lnMsg = x["Data"].as<JsonArrayConst>();
                  int opc = lnMsg[0];
                  if ((opc == 0xB0) || (opc == 0xBD)) //SW_REQ or SW_ACK
                  {
                    int b1 = lnMsg[1];
                    int b2 = lnMsg[2];
                    int dccaddr = ((b2 & 0x0F) << 7) + b1 + dcc_addr_base;
                    if (dccaddr == dcc_switch_address)
                    {
                      int dccdir = (b2 & 0x20) >> 5;
                      if (dccdir == 1)
                      {
                        id(esp0103).turn_on();
                      }
                      else
                      {
                        id(esp0103).turn_off();
                      }
                    }
                  }
                }
              }
            }

# Relay output configuration
switch:
  - platform: gpio
    pin:
      number: GPIO0   # Change to GPIO2 if your relay is wired there
      inverted: true  # Active LOW relay
    name: "ESP01 Relay3"
    id: esp0103
    on_turn_on:
      - mqtt.publish:
          topic: lnIn
          payload: !lambda |-
            int dcc_switch_address = id(my_dcc_addr1);
            int dcc_addr_base = id(my_dcc_base);
            int opcode = 0xB0;
            int tech_addr1 = (dcc_switch_address - dcc_addr_base) & 0x7F;
            int tech_addr2 = ((dcc_switch_address - dcc_addr_base) & 0x780) >> 7;
            if (id(esp0103).state == 1)
              tech_addr2 = tech_addr2 + 0x20;
            int xordata = opcode ^ tech_addr1 ^ tech_addr2 ^ 0xFF;
            DynamicJsonDocument doc(640);
            char myStatusMsg[512];
            doc["From"] = "ESP01 Relay3";
            doc["Valid"] = 1;
            doc["MsgType"] = "LN";
            doc["ReqID"] = 0;
            JsonArray Data = doc.createNestedArray("Data");
            Data.add(opcode);
            Data.add(tech_addr1);
            Data.add(tech_addr2);
            Data.add(xordata);
            serializeJson(doc, myStatusMsg);
            return std::string(myStatusMsg);
    on_turn_off:
      - mqtt.publish:
          topic: lnIn
          payload: !lambda |-
            int dcc_switch_address = id(my_dcc_addr1);
            int dcc_addr_base = id(my_dcc_base);
            int opcode = 0xB0;
            int tech_addr1 = (dcc_switch_address - dcc_addr_base) & 0x7F;
            int tech_addr2 = ((dcc_switch_address - dcc_addr_base) & 0x780) >> 7;
            if (id(esp0103).state == 1)
              tech_addr2 = tech_addr2 + 0x20;
            int xordata = opcode ^ tech_addr1 ^ tech_addr2 ^ 0xFF;
            DynamicJsonDocument doc(640);
            char myStatusMsg[512];
            doc["From"] = "ESP01 Relay3";
            doc["Valid"] = 1;
            doc["MsgType"] = "LN";
            doc["ReqID"] = 0;
            JsonArray Data = doc.createNestedArray("Data");
            Data.add(opcode);
            Data.add(tech_addr1);
            Data.add(tech_addr2);
            Data.add(xordata);
            serializeJson(doc, myStatusMsg);
            return std::string(myStatusMsg);

    restore_mode: RESTORE_DEFAULT_OFF  # Keeps relay off after reboot

 
