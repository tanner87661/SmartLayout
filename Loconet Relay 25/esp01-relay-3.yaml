esphome:
  name: esp01-relay-3
  friendly_name: ESP01_Relay_3

esp8266:
  board: esp01_1m

globals:
  - id: my_dcc_addr1
    type: int
    restore_value: yes
    initial_value: '25'
  - id: my_dcc_base
    type: int
    restore_value: yes
    initial_value: '0'
#  - id: my_topic
#    type: std::string
#    restore_value: yes
#    initial_value: '"lnIn"'

number:
  - platform: template
    name: "Switch Address"
    id: dcc_addr_input1
    min_value: 0
    max_value: 2048
    step: 1
    initial_value: 25
    optimistic: true
    set_action:
      then:
        - lambda: |-
            id(my_dcc_addr1) = (int)x;  

  - platform: template
    name: "Address Base"
    id: dcc_base_input
    min_value: 0
    max_value: 1
    step: 1
    initial_value: 0
    optimistic: true
    set_action:
      then:
        - lambda: |-
            id(my_dcc_base) = (int)x;  

